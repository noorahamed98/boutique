name: Deploy Frontend To Cloudflare Pages

on:
  push:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build And Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          missing=0

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi

          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "Missing GitHub variable: CLOUDFLARE_PAGES_PROJECT_NAME"
            missing=1
          fi

          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing GitHub variable: VITE_API_BASE_URL"
            echo "Set it to your deployed API base URL, for example https://api.example.com/api"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"
          workingDirectory: client
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
