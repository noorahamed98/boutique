name: Deploy Frontend To Cloudflare Pages

on:
  push:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build And Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Cloudflare configuration
        id: cloudflare-config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          missing=0
          missing_items=""

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            missing=1
            missing_items="${missing_items}- CLOUDFLARE_API_TOKEN"$'\n'
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
            missing_items="${missing_items}- CLOUDFLARE_ACCOUNT_ID"$'\n'
          fi

          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "Missing GitHub variable: CLOUDFLARE_PAGES_PROJECT_NAME"
            missing=1
            missing_items="${missing_items}- CLOUDFLARE_PAGES_PROJECT_NAME"$'\n'
          fi

          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Missing GitHub variable: VITE_API_BASE_URL"
            echo "Frontend build will continue with the default relative /api base."
            missing=1
            missing_items="${missing_items}- VITE_API_BASE_URL"$'\n'
          fi

          if [ "$missing" -ne 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Cloudflare Pages deploy skipped"
              echo
              echo "The frontend build still ran, but deployment was skipped because these repository settings are missing:"
              printf "%s" "$missing_items"
              echo
              echo "Add them in GitHub repository settings, then rerun this workflow:"
              echo "- Secrets: \`CLOUDFLARE_API_TOKEN\`, \`CLOUDFLARE_ACCOUNT_ID\`"
              echo "- Variables: \`CLOUDFLARE_PAGES_PROJECT_NAME\`, \`VITE_API_BASE_URL\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-config.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4"
          workingDirectory: client
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
